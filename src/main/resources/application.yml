# Valkey connection details.
# On the Platform, VALKEY_HOST and VALKEY_PORT are injected by the XDeployment
# function from the Valkey connection-details Secret. Locally they default below.
valkey:
  host: ${VALKEY_HOST:localhost}
  port: ${VALKEY_PORT:6379}
  # SERVER_AUTHENTICATION on the Memorystore instance -> TLS required.
  ssl-enabled: ${VALKEY_SSL_ENABLED:true}
  # IAM_AUTH on the Memorystore instance -> use a rotating GCP access token as password.
  iam-auth-enabled: ${VALKEY_IAM_AUTH_ENABLED:true}
  timeout-seconds: 10

# Echo endpoint (/api/echo) — reflects the request back as JSON for debugging.
echo:
  # Max request-body bytes echoed back; larger bodies are truncated and flagged.
  max-body-bytes: ${ECHO_MAX_BODY_BYTES:65536}
  # Header values redacted by default (case-insensitive). Prevents leaking secrets
  # into echoed responses / logs / screenshots.
  sensitive-headers: ${ECHO_SENSITIVE_HEADERS:authorization,cookie,set-cookie,proxy-authorization}
  # Whether ?revealSensitive=true may un-redact sensitive headers.
  # Defaults to false (redaction is always enforced). Set ECHO_REVEAL_SENSITIVE_ALLOWED=true
  # to allow callers to opt in to seeing raw sensitive header values.
  reveal-sensitive-allowed: ${ECHO_REVEAL_SENSITIVE_ALLOWED:false}
  # Whether callers may shape the response (status/delay/content-type overrides).
  configurable-response-enabled: ${ECHO_CONFIGURABLE_RESPONSE_ENABLED:true}
  # Hard cap on the artificial response delay in ms (DoS guard); requests above are clamped.
  max-delay-ms: ${ECHO_MAX_DELAY_MS:10000}

spring:
  application:
    name: probe
  lifecycle:
    # Let in-flight requests finish before shutdown (works with SIGTERM in K8s).
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Kubernetes readiness: gate traffic on Valkey connectivity.
        readiness:
          include: readinessState,valkey
        # Kubernetes liveness: process health only (never depend on Valkey).
        liveness:
          include: livenessState
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Demo proving GCP Memorystore Valkey connectivity (TLS + IAM auth)
