<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start probing</title>
  <link rel="icon" type="image/png" href="/logo.ico" />
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --panel-2: #eceef1;
      --text: #1f2430;
      --muted: #6b7280;
      --accent: #4b5563;
      --ok: #2f855a;
      --err: #c53030;
      --border: #d8dce1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; margin: 0; }
    header .badge {
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 2px 10px;
    }
    main {
      margin: 0; padding: 32px;
      display: grid; grid-template-columns: minmax(360px, 1fr) 1040px; gap: 24px;
      align-items: stretch;
    }
    .col-left { display: grid; gap: 24px; align-content: start; }
    .group { display: grid; gap: 12px; border-left: 3px solid var(--border); padding-left: 16px; }
    .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 0; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .checkbox-row input[type=checkbox] { cursor: pointer; }
    .col-right { display: flex; flex-direction: column; }
    .col-right .card { flex: 1; display: flex; flex-direction: column; }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px;
    }
    .card h2 { margin: 0 0 16px; font-size: 15px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    label { font-size: 12px; color: var(--muted); }
    input {
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 14px;
    }
    button {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: var(--panel-2); border: 1px solid var(--border); }
    button:hover { opacity: .92; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .info-item { background: var(--panel-2); border-radius: 8px; padding: 12px 14px; }
    .info-item .k { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .info-item .v { font-size: 15px; margin-top: 2px; word-break: break-all; }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pill.on { background: rgba(47,133,90,.14); color: #2f855a; }
    .pill.off { background: rgba(197,48,48,.14); color: #c53030; }
    .pill.warn { background: rgba(214,122,0,.14); color: #b7610a; }
    #log {
      background: #f0f1f3; border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px; flex: 1; min-height: 320px; overflow-y: auto; white-space: pre-wrap;
      color: var(--text);
    }
    .log-ok { color: #2f855a; }
    .log-err { color: #c53030; }
    .log-dim { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Start probing</h1>
    <span class="badge">TLS + IAM auth via Workload Identity</span>
  </header>

  <main>
    <div class="col-left">
    <div class="group">
      <span class="group-label">Valkey</span>
    <section class="card">
      <h2>Connection</h2>
      <div class="info-grid" id="info">
        <div class="info-item"><div class="k">Host</div><div class="v" id="info-host">…</div></div>
        <div class="info-item"><div class="k">Port</div><div class="v" id="info-port">…</div></div>
        <div class="info-item"><div class="k">TLS</div><div class="v" id="info-ssl">…</div></div>
        <div class="info-item"><div class="k">IAM Auth</div><div class="v" id="info-iam">…</div></div>
        <div class="info-item"><div class="k">SSL Insecure</div><div class="v" id="info-insecure">…</div></div>
      </div>
      <div class="row" style="margin-top:16px; justify-content:flex-end">
        <button onclick="ping()">PING</button>
      </div>
    </section>

    <section class="card">
      <h2>Set a value</h2>
      <div class="row">
        <div class="field"><label>Key</label><input id="set-key" value="demo:greeting" /></div>
        <div class="field"><label>Value</label><input id="set-value" value="hello from valkey" /></div>
        <div class="field" style="max-width:120px"><label>TTL (s)</label><input id="set-ttl" type="number" value="300" /></div>
        <button onclick="setValue()">SET</button>
      </div>
    </section>

    <section class="card">
      <h2>Get a value</h2>
      <div class="row">
        <div class="field"><label>Key</label><input id="get-key" value="demo:greeting" /></div>
        <button onclick="getValue()">GET</button>
      </div>
    </section>
    </div>

    <div class="group">
      <span class="group-label">Echo</span>
    <section class="card">
      <h2>Request reflector</h2>
      <div class="row">
        <div class="field" style="max-width:120px">
          <label>Method</label>
          <select id="echo-method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
            <option>PATCH</option>
          </select>
        </div>
        <div class="field"><label>Path (under /api/echo)</label><input id="echo-path" value="/hello?debug=1" /></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field"><label>Header name</label><input id="echo-hname" value="X-Debug" /></div>
        <div class="field"><label>Header value</label><input id="echo-hvalue" value="probe" /></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field" style="max-width:160px"><label>Force status</label><input id="echo-status" placeholder="e.g. 503" /></div>
        <div class="field" style="max-width:160px"><label>Delay (ms)</label><input id="echo-delay" placeholder="e.g. 2000" /></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field"><label>Body</label><input id="echo-body" value="hello from probe" /></div>
      </div>
      <div class="row" style="margin-top:12px; justify-content:space-between; align-items:center">
        <label class="checkbox-row">
          <input type="checkbox" id="echo-reveal" />
          Reveal sensitive headers (Authorization, Cookie…)
        </label>
        <button onclick="echoRequest()">SEND</button>
      </div>
    </section>
    </div>
    </div>

    <div class="col-right">
    <section class="card">
      <h2>Activity log</h2>
      <div id="log"></div>
    </section>
    </div>
  </main>

  <script>
    const logEl = document.getElementById('log');

    function log(msg, cls = 'log-dim') {
      const line = document.createElement('div');
      line.className = cls;
      const t = new Date().toLocaleTimeString();
      line.textContent = `[${t}] ${msg}`;
      logEl.prepend(line);
    }

    async function call(path, opts) {
      try {
        const res = await fetch(path, opts);
        const data = await res.json();
        if (!res.ok) {
          // RFC 7807 ProblemDetail from the global exception handler.
          log(`${data.title || 'Error'}: ${data.detail || res.status}`, 'log-err');
          return null;
        }
        return data;
      } catch (e) {
        log('Request failed: ' + e, 'log-err');
        return null;
      }
    }

    async function loadInfo() {
      try {
        const res = await fetch('/api/valkey/info');
        const i = await res.json();
        document.getElementById('info-host').textContent = i.host;
        document.getElementById('info-port').textContent = i.port;
        document.getElementById('info-ssl').innerHTML = pill(i.sslEnabled);
        document.getElementById('info-iam').innerHTML = pill(i.iamAuthEnabled);
        document.getElementById('info-insecure').innerHTML = pillWarn(i.sslInsecure);
      } catch (e) {
        log('Could not load connection info: ' + e, 'log-err');
      }
    }

    function pill(on) {
      return on
        ? '<span class="pill on">enabled</span>'
        : '<span class="pill off">disabled</span>';
    }

    // For flags where "true" is a warning (e.g. SSL insecure).
    function pillWarn(on) {
      return on
        ? '<span class="pill warn">yes</span>'
        : '<span class="pill off">no</span>';
    }

    function ping() {
      call('/api/valkey/ping').then(d => {
        if (d) log(`PING -> ${d.reply}  (${d.latencyMs} ms)`, d.ok ? 'log-ok' : 'log-err');
      });
    }

    function setValue() {
      const body = {
        key: document.getElementById('set-key').value,
        value: document.getElementById('set-value').value,
        ttlSeconds: Number(document.getElementById('set-ttl').value) || 300
      };
      call('/api/valkey/set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(d => {
        if (d) log(`SET ${d.key} (ttl ${d.ttlSeconds}s)  (${d.latencyMs} ms)`, 'log-ok');
      });
    }

    function getValue() {
      const key = encodeURIComponent(document.getElementById('get-key').value);
      call('/api/valkey/get?key=' + key).then(d => {
        if (!d) return;
        if (d.found) log(`GET ${d.key} -> "${d.value}"  (${d.latencyMs} ms)`, 'log-ok');
        else log(`GET ${d.key} -> (nil)  (${d.latencyMs} ms)`, 'log-err');
      });
    }

    async function echoRequest() {
      const method = document.getElementById('echo-method').value;
      let path = document.getElementById('echo-path').value.trim();
      if (!path.startsWith('/')) path = '/' + path;

      const reveal = document.getElementById('echo-reveal').checked;
      const sep = path.includes('?') ? '&' : '?';
      const url = '/api/echo' + path + (reveal ? sep + 'revealSensitive=true' : '');

      const headers = {};
      const hname = document.getElementById('echo-hname').value.trim();
      const hvalue = document.getElementById('echo-hvalue').value;
      if (hname) headers[hname] = hvalue;

      const status = document.getElementById('echo-status').value.trim();
      if (status) headers['x-set-response-status-code'] = status;
      const delay = document.getElementById('echo-delay').value.trim();
      if (delay) headers['x-set-response-delay-ms'] = delay;

      const opts = { method, headers };
      const bodyVal = document.getElementById('echo-body').value;
      if (method !== 'GET' && method !== 'DELETE' && bodyVal) {
        headers['Content-Type'] = 'text/plain';
        opts.body = bodyVal;
      }

      try {
        const res = await fetch(url, opts);
        const data = await res.json();
        const cls = res.ok ? 'log-ok' : 'log-err';
        log(`ECHO ${method} ${path}${reveal ? ' [reveal]' : ''} -> HTTP ${res.status}`, cls);
        log(JSON.stringify(data, null, 2), 'log-dim');
      } catch (e) {
        log('Echo request failed: ' + e, 'log-err');
      }
    }

    loadInfo();
    log('UI ready. Try PING to verify connectivity.', 'log-dim');
  </script>
</body>
</html>
